traefik:
  instanceLabelOverride: traefik
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  globalArguments: []
  deployment:
    replicas: 1
    revisionHistoryLimit: 0
  logs:
    access:
      enabled: true
  ports:
    web:
      hostPort: 80
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
    websecure:
      hostPort: 443
      tls:
        enabled: true
  service:
    type: NodePort
    externalIPs:
      - 89.167.56.191
  additionalArguments:
    - "--entrypoints.web.proxyprotocol=true"
    - "--entrypoints.web.proxyprotocol.insecure=true"
    - "--entrypoints.websecure.proxyprotocol=true"
    - "--entrypoints.websecure.proxyprotocol.insecure=true"
  providers:
    kubernetesIngress:
      publishedService:
        enabled: true
  ingressRoute:
    dashboard:
      enabled: true
      annotations: {traefik.ingress.kubernetes.io/router.tls: "true"}
