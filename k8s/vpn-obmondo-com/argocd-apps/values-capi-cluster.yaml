global:
  clusterName: vpn-obmondo-com
  kubernetes:
    version: v1.32.0
  kubeaid:
    repo: git@github.com:Obmondo/KubeAid
  kubeaidConfig:
    repo: git@github.com:sbdtu5498/kubeaid-config.git
  additionalUsers: 
    []
provider:
  hetzner: true

hetzner:
  mode: hcloud

  sshKeyPair:
    name: kubeaid-demo
  hcloud:
    sshKeyPairName: kubeaid-demo

    zone: eu-central
    imageName: ubuntu-24.04
    hetznerNetwork:
      cidr: 10.0.0.0/16
      hcloudServersSubnetCIDR: 10.0.0.0/24

  controlPlane:
    regions: 
      - hel1

    

    
    hcloud: 
      machineType: cax21
      replicas: 1
      loadBalancer:
        enabled: true
        region: hel1

  nodeGroups: 
    hcloud: []
    bareMetal: []
