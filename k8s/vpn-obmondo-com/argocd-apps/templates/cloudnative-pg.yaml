apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  labels:
    kubeaid.io/version: 20.1.1
    kubeaid.io/managed-by: kubeaid
    kubeaid.io/sync-order: "10"
spec:
  destination:
    namespace: cloudnative-pg
    server: 'https://kubernetes.default.svc'
  sources:
    - repoURL: git@github.com:Obmondo/KubeAid
      path: argocd-helm-charts/cloudnative-pg
      targetRevision: 20.1.1
      helm:
        valueFiles:
          - $values/k8s/vpn-obmondo-com/argocd-apps/values-cloudnative-pg.yaml
    - repoURL: git@github.com:sbdtu5498/kubeaid-config.git
      targetRevision: HEAD
      ref: values
  project: default
  syncPolicy:
    automated: null
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
