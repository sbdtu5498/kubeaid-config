apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    kubeaid.io/version: 23.0.0
    kubeaid.io/managed-by: kubeaid
    kubeaid.io/sync-order: "10"
  name: netbird
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: netbird
  project: kubeaid
  sources:
    - repoURL: git@github.com:Obmondo/KubeAid
      path: argocd-helm-charts/netbird
      targetRevision: 23.0.0
      helm:
        valueFiles:
          - $values/k8s/vpn-obmondo-com/argocd-apps/values-netbird.yaml
    - repoURL: git@github.com:sbdtu5498/kubeaid-config.git
      targetRevision: HEAD
      ref: values
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
