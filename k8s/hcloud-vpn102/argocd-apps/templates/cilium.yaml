apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    kubeaid.io/version: fix_networking_for_capi_hcloud
    kubeaid.io/managed-by: kubeaid
    kubeaid.io/sync-order: "10"
  name: cilium
  namespace: argocd
spec:
  destination:
    namespace: cilium
    server: https://kubernetes.default.svc
  project: kubeaid
  sources:
    - repoURL: git@github.com:Obmondo/KubeAid.git
      path: argocd-helm-charts/cilium
      targetRevision: fix_networking_for_capi_hcloud
      helm:
        valueFiles:
          - $values/k8s/hcloud-vpn102/argocd-apps/values-cilium.yaml
    - repoURL: git@github.com:sbdtu5498/kubeaid-config.git
      targetRevision: HEAD
      ref: values
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  ignoreDifferences:
    - kind: Secret
      name: cilium-ca
      jsonPointers:
        - /data
    - kind: Secret
      name: hubble-server-certs
      jsonPointers:
        - /data
    - kind: Secret
      name: hubble-relay-client-certs
      jsonPointers:
        - /data
