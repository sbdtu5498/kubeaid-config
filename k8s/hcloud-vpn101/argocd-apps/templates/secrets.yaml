apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    kubeaid.io/version: fix_networking_for_capi_hcloud
    kubeaid.io/managed-by: kubeaid
    kubeaid.io/sync-order: "10"
  name: secrets
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  project: kubeaid
  source:
    path: k8s/hcloud-vpn101/sealed-secrets
    repoURL: git@github.com:sbdtu5498/kubeaid-config.git
    targetRevision: HEAD
    directory:
      recurse: true
