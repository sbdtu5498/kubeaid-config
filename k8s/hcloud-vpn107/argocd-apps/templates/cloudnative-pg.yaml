apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    kubeaid.io/version: 28.0.0
    kubeaid.io/managed-by: kubeaid
    kubeaid.io/sync-order: "10"
  name: cloudnative-pg
  namespace: argocd
spec:
  destination:
    namespace: cnpg-operator
    server: https://kubernetes.default.svc
  project: kubeaid
  sources:
    - repoURL: https://github.com/Obmondo/KubeAid.git
      path: argocd-helm-charts/cloudnative-pg
      targetRevision: 28.0.0
      helm:
        valueFiles:
          - $values/k8s/hcloud-vpn107/argocd-apps/values-cloudnative-pg.yaml
    - repoURL: git@github.com:sbdtu5498/kubeaid-config
      targetRevision: HEAD
      ref: values
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
