git:
  sshUsername: git
  useSSHAgent: false
  privateKeyFilePath: /home/sanskar/.ssh/id_ed25519

forkURLs:
  kubeaid:
    url: https://github.com/Obmondo/KubeAid.git
    version: 28.0.0
  kubeaidConfig:
    url: git@github.com:sbdtu5498/kubeaid-config
    directory: 

cluster:
  type: vpn
  name: hcloud-vpn107
  k8sVersion: v1.35.4
  enableAuditLogging: false
  acmeEmail: ops@obmondo.com
  apiServer:
    extraArgs: {}
    extraVolumes: []
    files: []
    oidc:
      issuerUrl: https://keycloak-staging.kcm.obmondo.com/auth/realms/netbird
      clientId: kubernetes-hcloud-vpn107
  keycloak:
    mode: external
    dns: keycloak-staging.kcm.obmondo.com
  netbird:
    dns: netbird.vpn.obmondo.com
  argoCD:
    deployKeys:
      kubeaid:
        privateKeyFilePath: /home/sanskar/.ssh/id_ed25519
      kubeaidConfig:
        privateKeyFilePath: /home/sanskar/.ssh/id_ed25519

kubePrometheus:
  version: v0.17.0

cloud:
  hetzner:
    mode: hcloud
    sshKeyPair:
      name: private
      privateKeyFilePath: /tmp/private.key
    hcloud:
      zone: eu-central
      imageName: ubuntu-24.04
      hetznerNetwork:
        cidr: "10.0.0.0/16"
        hcloudServersSubnetCIDR: "10.0.0.0/24"
    controlPlane:
      hcloud:
        machineType: cpx32
        replicas: 1
        loadBalancer:
          enabled: true
          region: nbg1
          endpoint: api.vpn.obmondo.com
      regions:
        - nbg1
    nodeGroups:
      hcloud: []

